name: Public Install Sanity

on:
  workflow_dispatch:
  pull_request:
    paths:
      - '.cache-key'

permissions:
  contents: read
  actions: read
  pull-requests: write

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Build cache key string
        id: cache_key
        shell: bash
        run: |
          KEY_STR="demo|${{ runner.os }}|$(sha256sum .cache-key | cut -d ' ' -f1)"
          echo "key_str=$KEY_STR" >> "$GITHUB_OUTPUT"

      - name: Compute key fingerprint
        id: cache_fp
        shell: bash
        run: |
          KEY_FP=$(node -e "const c=require('crypto'); const s=process.env.KEY_STR; console.log(c.createHash('sha256').update(s).digest('hex').slice(0,12))")
          echo "key_fp=$KEY_FP" >> "$GITHUB_OUTPUT"
        env:
          KEY_STR: ${{ steps.cache_key.outputs.key_str }}

      - name: Prepare cache path
        shell: bash
        run: |
          mkdir -p .cache/demo
          date > .cache/demo/timestamp.txt

      - name: "[cache-step] group=demo-cache"
        id: demo_cache
        uses: actions/cache@v4
        with:
          path: .cache/demo
          key: ${{ steps.cache_key.outputs.key_str }}
          restore-keys: |
            demo|${{ runner.os }}|

      - name: "[cache] group=demo-cache hit=${{ steps.demo_cache.outputs.cache-hit }} key_fp=${{ steps.cache_fp.outputs.key_fp }} key_hint=demo"
        shell: bash
        run: echo cache-marker

  gate:
    runs-on: ubuntu-latest
    needs: [build]
    if: ${{ always() }}
    steps:
      - uses: actions/checkout@v4

      - name: Cache Health Gate (public ref)
        id: gate
        uses: eivindsjursen-lab/gates-suite-public-beta/packages/cache-health-gate@cache-health-gate/v1
        env:
          PR_NUMBER: ${{ github.event.pull_request.number }}
        with:
          mode: warn
          no_baseline_behavior: warn
          baseline_runs: "10"
          baseline_event_filter: workflow_dispatch
          debug: "true"

      - name: Print outputs
        run: |
          echo "RESULT=${{ steps.gate.outputs.result }}"
          echo "CONFIDENCE=${{ steps.gate.outputs.confidence }}"
          echo "BASELINE_SAMPLES=${{ steps.gate.outputs.baseline_samples }}"
          echo "REASON_CODES=${{ steps.gate.outputs.reason_codes }}"
